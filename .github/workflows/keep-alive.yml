name: Keep Backend Alive

on:
  schedule:
    # Every 14 minutes — Render free tier sleeps after 15 min inactivity
    - cron: '*/14 * * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://gang-sheet-backend.onrender.com/health)
          echo "Backend responded with HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: backend returned $STATUS"
          fi
